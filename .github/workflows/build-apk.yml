name: 🎬 Build VidSlice APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Install dependencies
        run: npm install

      - name: 🏗️ Install Expo CLI
        run: npm install -g @expo/cli

      - name: 🤖 Generate Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOTENV: 1

      - name: 🔑 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🏗️ Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --max-workers=2
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m'
          JAVA_TOOL_OPTIONS: '-Xmx3g'

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VidSlice-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🚀 Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "🎬 VidSlice v1.0.${{ github.run_number }}"
          body: |
            ## ⬇️ تحميل التطبيق
            اضغط على **app-debug.apk** في الأسفل لتحميله على موبايلك مباشرة
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
