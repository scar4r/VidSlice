name: 🎬 Build VidSlice APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # زر يدوي تقدر تضغطه في أي وقت

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm install

      - name: 🏗️ Install Expo CLI
        run: npm install -g @expo/cli

      - name: 🤖 Generate Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOTENV: 1

      - name: 🔑 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🏗️ Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VidSlice-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "VidSlice v1.0.${{ github.run_number }}"
          body: |
            ## 🎬 VidSlice — تطبيق تقسيم الفيديوهات

            ### التحميل
            ⬇️ حمّل الـ APK من **Assets** تحت

            ### المميزات
            - تقسيم الفيديو لأجزاء 15 / 30 / 60 / 90 ثانية
            - جودة كاملة بدون إعادة ترميز
            - حفظ ومشاركة مباشرة
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
